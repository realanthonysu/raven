pre-commit:
  parallel: true
  commands:
    biome-check:
      glob: "*.{ts,tsx}"
      run: npx biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    rust-fmt:
      glob: "*.rs"
      run: cargo fmt --manifest-path src-tauri/Cargo.toml --check
    rust-clippy:
      glob: "*.rs"
      run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

pre-push:
  commands:
    test:
      run: npx vitest run
