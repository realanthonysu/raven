[package]
name = "raven"
version = "0.0.0"
description = "Raven — 英语学习助手"
authors = ["you"]
edition = "2021"

[lib]
name = "raven_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
